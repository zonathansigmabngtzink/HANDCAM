<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handcam Full Screen (Optimized)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video dan Canvas dibuat menumpuk */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* object-fit memastikan layar penuh tanpa gepeng */
            object-fit: cover;
            /* Efek cermin (Mirror) */
            transform: scaleX(-1);
        }

        /* Canvas dibuat transparan di atas video */
        canvas {
            z-index: 2;
            pointer-events: none; /* Agar klik tembus ke video jika diperlukan */
        }

        video {
            z-index: 1;
        }

        #loading {
            position: absolute;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">Memuat Model AI...</div>
        <!-- Playsinline diperlukan untuk berjalan mulus di perangkat mobile -->
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <!-- Menggunakan ES Modules untuk performa modern -->
    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js";

        const video = document.getElementById("input_video");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const loadingMsg = document.getElementById("loading");

        let handLandmarker = undefined;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;
        
        // Inisialisasi utils gambar bawaan yang sudah teroptimasi
        const drawingUtils = new DrawingUtils(canvasCtx);

        // Langkah 1: Memuat Model AI (Dijalankan secara asinkron)
        const createHandLandmarker = async () => {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    // MENGGUNAKAN GPU UNTUK PERFORMA EKSTRIM
                    delegate: "GPU"
                },
                runningMode: runningMode,
                numHands: 1, // Fokus 1 tangan lebih ringan
                minHandDetectionConfidence: 0.5,
                minHandPresenceConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            loadingMsg.innerText = "Menyalakan Kamera...";
            startCamera();
        };

        // Langkah 2: Menyalakan Kamera Web secara Native
        const startCamera = async () => {
            const constraints = {
                video: {
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            } catch (err) {
                console.error("Gagal mengakses kamera: ", err);
                loadingMsg.innerText = "Akses Kamera Ditolak / Error";
            }
        };

        // Langkah 3: Looping Pendeteksian yang dioptimalkan
        const predictWebcam = async () => {
            // Sembunyikan loading
            loadingMsg.style.opacity = '0';
            setTimeout(() => loadingMsg.style.display = 'none', 500);

            // Sesuaikan ukuran internal canvas dengan resolusi asli video agar akurat
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            // OPTIMASI: Hanya proses AI jika frame video benar-benar berubah (menghemat CPU)
            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                
                // Proses deteksi
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                // Bersihkan canvas dari coretan frame sebelumnya
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                // Gambar tangan jika terdeteksi
                if (results.landmarks) {
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, {
                            color: "#FFFFFF",
                            lineWidth: 2
                        });
                        drawingUtils.drawLandmarks(landmarks, {
                            color: "#00EAFF",
                            lineWidth: 1,
                            radius: 4
                        });
                    }
                }
            }

            // Loop ke frame berikutnya menggunakan fungsi bawaan browser paling optimal
            window.requestAnimationFrame(predictWebcam);
        };

        // Jalankan Inisialisasi
        createHandLandmarker();

        // Tangani jika jendela diubah ukurannya agar mapping tetap akurat
        window.addEventListener('resize', () => {
            if (video.videoWidth > 0) {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
            }
        });
    </script>
</body>
</html>
